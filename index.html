<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>电影金句卡片生成器</title>
  <style>
    :root {
      --ink: #f5ead6;
      --muted: rgba(245, 234, 214, 0.68);
      --line: rgba(245, 234, 214, 0.18);
      --red: #9f1d1d;
      --gold: #c8a15d;
      --shadow: rgba(0, 0, 0, 0.46);
      --theme-rgb: 34, 76, 61;
      --theme-deep-rgb: 8, 18, 15;
      --card-rgb: 14, 20, 18;
      --accent-rgb: 138, 190, 157;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      color: var(--ink);
      position: relative;
      background:
        radial-gradient(circle at 18% 18%, rgba(var(--theme-rgb), 0.42), transparent 30%),
        radial-gradient(circle at 82% 78%, rgba(var(--accent-rgb), 0.18), transparent 32%),
        linear-gradient(135deg, rgb(var(--theme-deep-rgb)) 0%, #100f10 46%, rgba(var(--theme-rgb), 0.88) 100%);
      transition: background 420ms ease;
      font-family: "Noto Serif SC", "Songti SC", "STSong", "Times New Roman", serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.018) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: radial-gradient(circle, black 35%, transparent 78%);
      z-index: 1;
    }

    .backdrop {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
      background: #080807;
    }

    .backdrop-layer {
      position: absolute;
      inset: -18%;
      opacity: 0;
      filter: blur(32px) brightness(0.82) saturate(1.35) hue-rotate(0deg);
      transform: scale(1.06);
      animation:
        colorDrift 10s ease-in-out infinite alternate,
        hueBreath 6.5s ease-in-out infinite alternate;
      transition: opacity 420ms ease;
      will-change: opacity, transform, filter;
    }

    .backdrop-layer.is-visible {
      opacity: 1;
    }

    .stage {
      position: fixed;
      top: 50%;
      left: 50%;
      width: min(92vw, 780px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      transform: translate(-50%, -50%);
      z-index: 2;
    }

    .search-cluster {
      width: min(520px, 92vw);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .search-row {
      width: 100%;
      display: flex;
      align-items: stretch;
      gap: 0;
      padding: 4px;
      border: 1px solid rgba(var(--accent-rgb), 0.32);
      border-radius: 999px;
      background: rgba(var(--card-rgb), 0.42);
      backdrop-filter: blur(14px);
      transition: border-color 220ms ease, box-shadow 220ms ease;
    }

    .search-row:focus-within {
      border-color: rgb(var(--accent-rgb));
      box-shadow: 0 0 0 3px rgba(var(--accent-rgb), 0.18);
    }

    .search-row input {
      flex: 1;
      min-width: 0;
      border: none;
      border-radius: 999px 0 0 999px;
      padding: 12px 18px;
      color: var(--ink);
      background: transparent;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      font: inherit;
      outline: none;
    }

    .search-row input::placeholder {
      color: rgba(245, 234, 214, 0.36);
    }

    .search-row button:focus-visible {
      box-shadow: 0 0 0 3px rgba(var(--accent-rgb), 0.18);
    }

    .search-row button {
      border: none;
      border-radius: 999px;
      padding: 10px 22px;
      letter-spacing: 0.22em;
      white-space: nowrap;
      background: rgba(var(--accent-rgb), 0.14);
      opacity: 0.78;
    }

    .search-row button:hover {
      transform: none;
      background: rgba(var(--accent-rgb), 0.22);
      opacity: 1;
    }

    .search-status {
      width: min(520px, 92vw);
      min-height: 16px;
      margin: 0;
      color: rgba(245, 234, 214, 0.48);
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-align: center;
    }

    .card {
      position: relative;
      width: 100%;
      height: clamp(430px, 56vh, 520px);
      padding: clamp(34px, 7vw, 72px);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border: 1px solid rgba(var(--accent-rgb), 0.34);
      border-radius: 30px;
      background:
        linear-gradient(145deg, rgba(255, 248, 232, 0.1), rgba(255, 255, 255, 0.035)),
        rgba(var(--card-rgb), 0.74);
      box-shadow:
        0 30px 90px var(--shadow),
        0 0 84px rgba(var(--theme-rgb), 0.28),
        inset 0 0 0 1px rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(18px);
      transition: background 420ms ease, border-color 420ms ease, box-shadow 420ms ease;
    }

    .content {
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: opacity 420ms ease;
    }

    .card::before {
      content: "";
      position: absolute;
      top: 22px;
      left: 22px;
      width: 54px;
      height: 54px;
      border-top: 1px solid rgb(var(--accent-rgb));
      border-left: 1px solid rgb(var(--accent-rgb));
      transition: border-color 420ms ease;
      opacity: 0.75;
    }

    .card::after {
      content: "";
      position: absolute;
      right: 22px;
      bottom: 22px;
      width: 54px;
      height: 54px;
      border-right: 1px solid rgb(var(--accent-rgb));
      border-bottom: 1px solid rgb(var(--accent-rgb));
      transition: border-color 420ms ease;
      opacity: 0.75;
    }

    .quote-panel {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow-x: hidden;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(var(--accent-rgb), 0.32) transparent;
    }

    .quote-panel::-webkit-scrollbar {
      width: 4px;
    }

    .quote-panel::-webkit-scrollbar-track {
      background: transparent;
    }

    .quote-panel::-webkit-scrollbar-thumb {
      background: rgba(var(--accent-rgb), 0.32);
      border-radius: 999px;
    }

    .quote {
      width: 100%;
      margin: auto 0;
      font-size: var(--quote-size, clamp(28px, 5vw, 48px));
      font-weight: 500;
      line-height: 1.55;
      letter-spacing: 0.06em;
      text-align: left;
      text-wrap: wrap;
      white-space: normal;
      word-break: normal;
      overflow-wrap: anywhere;
      text-shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
      opacity: 1;
      transition: opacity 280ms linear 280ms;
    }

    .quote.is-prepping {
      opacity: 0;
      transition: none;
    }

    .quote-ghost {
      position: absolute;
      inset: 0;
      margin: 0;
      width: 100%;
      display: flex;
      align-items: center;
      pointer-events: none;
      overflow: hidden;
      opacity: 0;
      transition: opacity 280ms linear 0ms;
    }

    .quote-ghost.is-prepping {
      opacity: 1;
      transition: none;
    }

    .meta {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      border-top: 1px solid var(--line);
      padding-top: 22px;
      color: var(--muted);
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      flex-shrink: 0;
    }

    .meta > div {
      flex: 1;
      min-width: 0;
    }

    .film {
      margin: 0;
      color: var(--ink);
      font-size: 15px;
      letter-spacing: 0.16em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .year {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.22em;
      min-height: 1em;
    }

    .source-meter {
      position: absolute;
      right: clamp(22px, 4.6vw, 46px);
      bottom: calc(clamp(34px, 7vw, 72px) + 22px);
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.12em;
      font-variant-numeric: tabular-nums;
      transition: color 320ms ease;
      z-index: 1;
    }

    .source-meter[data-source="online"] {
      color: var(--gold);
    }

    .actions {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .auto-toggle {
      position: absolute;
      top: 50%;
      right: calc(50% + 100px + 12px);
      transform: translateY(-50%);
      padding: 14px 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .auto-icon {
      display: block;
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 6px 0 6px 10px;
      border-color: transparent transparent transparent var(--ink);
      transition: border-color 220ms ease;
    }

    .auto-toggle:hover {
      transform: translateY(-50%);
    }

    .auto-toggle:active {
      transform: translateY(-50%);
    }

    .auto-toggle.is-active .auto-icon {
      animation: autoPulse 1.6s ease-in-out infinite;
    }

    @keyframes autoPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.45; }
    }

    .action-stage {
      position: relative;
      width: 200px;
      height: 46px;
    }

    .next-btn {
      position: absolute;
      inset: 0;
      width: 100%;
      padding: 0;
      letter-spacing: 0.36em;
      opacity: 1;
      transform: scale(1);
      transition: opacity 320ms ease, transform 320ms ease, background 420ms ease, border-color 420ms ease;
    }

    .interval-picker {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 4px;
      border: 1px solid rgba(var(--accent-rgb), 0.56);
      border-radius: 999px;
      background: rgba(var(--card-rgb), 0.38);
      opacity: 0;
      transform: scale(0.92);
      pointer-events: none;
      transition: opacity 320ms ease, transform 320ms ease;
    }

    .interval-thumb {
      position: absolute;
      top: 4px;
      bottom: 4px;
      left: 4px;
      width: calc(50% - 4px);
      border-radius: 999px;
      background: rgba(var(--accent-rgb), 0.26);
      transform: translateX(0);
      transition: transform 360ms cubic-bezier(0.4, 0.05, 0.2, 1);
      pointer-events: none;
    }

    .interval-picker[data-active="15000"] .interval-thumb {
      transform: translateX(100%);
    }

    .action-stage[data-mode="playing"] .next-btn {
      opacity: 0;
      transform: scale(0.94);
      pointer-events: none;
    }

    .action-stage[data-mode="playing"] .interval-picker {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
    }

    .interval-option {
      position: relative;
      z-index: 1;
      flex: 1;
      border: none;
      padding: 8px 0;
      border-radius: 999px;
      background: transparent;
      letter-spacing: 0.22em;
      color: var(--muted);
      font-size: 12px;
      transition: color 220ms ease;
    }

    .interval-option:hover {
      transform: none;
      background: transparent;
      color: var(--ink);
    }

    .interval-option.is-selected {
      color: var(--ink);
    }

    button {
      border: 1px solid rgba(var(--accent-rgb), 0.56);
      border-radius: 999px;
      padding: 14px 30px;
      color: var(--ink);
      background: rgba(var(--card-rgb), 0.38);
      cursor: pointer;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      font-size: 13px;
      letter-spacing: 0.28em;
      transition: transform 220ms ease, background 420ms ease, border-color 420ms ease;
    }

    button:hover {
      transform: translateY(-2px);
      border-color: rgb(var(--accent-rgb));
      background: rgba(var(--accent-rgb), 0.24);
    }

    button:focus-visible {
      border-color: rgb(var(--accent-rgb));
      box-shadow: 0 0 0 3px rgba(var(--accent-rgb), 0.18);
    }

    button:active {
      transform: translateY(0);
    }

    .fade-out {
      opacity: 0;
    }

    @keyframes colorDrift {
      0% {
        transform: scale(1.06) translate3d(-4.2%, -2.8%, 0) rotate(-1.2deg);
      }

      45% {
        transform: scale(1.13) translate3d(3.6%, -4.4%, 0) rotate(2.2deg);
      }

      100% {
        transform: scale(1.09) translate3d(4.8%, 3.8%, 0) rotate(-2deg);
      }
    }

    @keyframes hueBreath {
      0% {
        filter: blur(32px) brightness(0.78) saturate(1.25) hue-rotate(-14deg);
      }

      50% {
        filter: blur(34px) brightness(0.9) saturate(1.58) hue-rotate(0deg);
      }

      100% {
        filter: blur(32px) brightness(0.82) saturate(1.42) hue-rotate(18deg);
      }
    }

    .signature {
      position: fixed;
      right: 30px;
      bottom: 24px;
      color: rgba(245, 234, 214, 0.34);
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      font-size: 11px;
      writing-mode: vertical-rl;
      z-index: 2;
    }

    @media (max-width: 560px) {
      body {
        overflow: auto;
      }

      .stage {
        width: min(90vw, 780px);
        gap: 18px;
      }

      .card {
        height: min(58vh, 430px);
        border-radius: 24px;
      }

      .meta {
        align-items: start;
        flex-direction: column;
      }

      .signature {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="backdrop" aria-hidden="true">
    <div class="backdrop-layer is-visible"></div>
    <div class="backdrop-layer"></div>
  </div>

  <main class="stage">
    <div class="search-cluster">
      <form class="search-row" id="searchForm" autocomplete="off" aria-label="电影台词搜索">
        <input
          type="search"
          id="searchInput"
          name="movie"
          placeholder="输入电影名，例如：花样年华"
          aria-label="电影名"
          maxlength="60">
        <button type="submit" id="searchButton">搜索</button>
      </form>
      <p class="search-status" id="searchStatus" role="status" aria-live="polite"></p>
    </div>

    <section class="card" id="card" aria-live="polite">
      <div class="content" id="content">
        <div class="quote-panel" id="quotePanel">
          <h1 class="quote" id="quote"></h1>
          <div class="quote quote-ghost" id="quoteGhost" aria-hidden="true"></div>
        </div>

        <footer class="meta">
          <div>
            <p class="film" id="film"></p>
            <p class="year" id="year"></p>
          </div>
        </footer>
      </div>
      <span class="source-meter" id="sourceMeter" data-source="local" aria-label="台词位置"></span>
    </section>

    <div class="actions">
      <button type="button" id="autoButton" class="auto-toggle" aria-label="自动播放" title="自动播放">
        <span class="auto-icon" aria-hidden="true"></span>
      </button>
      <div class="action-stage" id="actionStage" data-mode="idle">
        <button type="button" id="nextButton" class="next-btn">下一句</button>
        <div class="interval-picker" id="intervalPicker" role="group" aria-label="自动播放间隔">
          <span class="interval-thumb" aria-hidden="true"></span>
          <button type="button" class="interval-option is-selected" data-interval="6000">6s</button>
          <button type="button" class="interval-option" data-interval="15000">15s</button>
        </div>
      </div>
    </div>
  </main>

  <div class="signature">一帧一句</div>

  <audio id="bgMusic" preload="auto"></audio>

  <script>
    const defaultProofread = {
      label: "待校对",
      detail: "台词、译文与出处需逐条核验"
    };

    const rawQuotes = [
      { text: "如果多一张船票，你会不会跟我一起走？", film: "花样年华", year: "2000", themeColor: "#5f1b1f" },
      { text: "黎耀辉，不如我们从头来过。", film: "春光乍泄", year: "1997", themeColor: "#163f3a" },
      { text: "不知道从什么时候开始，在什么东西上面都有个日期。", film: "重庆森林", year: "1994", themeColor: "#123f32" },
      { text: "念念不忘，必有回响。", film: "一代宗师", year: "2013", themeColor: "#4a2d16" },
      { text: "人生如戏，戏如人生。", film: "霸王别姬", year: "1993", themeColor: "#5b121b" },
      { text: "做人如果没有梦想，那跟咸鱼有什么分别？", film: "少林足球", year: "2001", themeColor: "#273b1d" },
      { text: "曾经有一份真诚的爱情放在我面前，我没有珍惜。", film: "大话西游之大圣娶亲", year: "1995", themeColor: "#4d2a55" },
      { text: "要努力，要不负此生。", film: "千与千寻", year: "2001", themeColor: "#234335" },
      { text: "世界上有那么多城镇，城镇中有那么多酒馆，她却偏偏走进了我的。", film: "卡萨布兰卡", year: "1942", themeColor: "#3b3428" },
      { text: "明天又是新的一天。", film: "乱世佳人", year: "1939", themeColor: "#5a2418" },
      { text: "愿原力与你同在。", film: "星球大战", year: "1977", themeColor: "#18233f" },
      { text: "生活就像一盒巧克力，你永远不知道下一颗是什么味道。", film: "阿甘正传", year: "1994", themeColor: "#253a4c" },
      { text: "希望是美好的，也许是人间至善，而美好的事物永不消逝。", film: "肖申克的救赎", year: "1994", themeColor: "#20344a" },
      { text: "我会回来的。", film: "终结者", year: "1984", themeColor: "#3c1416" },
      { text: "去活出你的人生。", film: "死亡诗社", year: "1989", themeColor: "#4a2f1d" },
      { text: "你不能因为害怕失去，就拒绝拥有。", film: "心灵捕手", year: "1997", themeColor: "#2a3d52" },
      { text: "我们一路奋战，不是为了改变世界，而是为了不让世界改变我们。", film: "熔炉", year: "2011", themeColor: "#20272f" },
      { text: "有些鸟儿是关不住的，因为它们的每一片羽毛都闪耀着自由的光辉。", film: "肖申克的救赎", year: "1994", themeColor: "#20344a" },
      { text: "每一次相遇，都是久别重逢。", film: "一代宗师", year: "2013", themeColor: "#4a2d16" },
      { text: "这世上只有一种成功，就是用自己喜欢的方式过一生。", film: "头文字D", year: "2005", themeColor: "#1c2b38" },
      { text: "要么忙着活，要么忙着死。", film: "肖申克的救赎", director: "弗兰克·德拉邦特", year: "1994", themeColor: "#20344a" },
      { text: "说好了一辈子，差一年、一个月、一天、一个时辰，都不算一辈子。", film: "霸王别姬", director: "陈凯歌", year: "1993", themeColor: "#5b121b" },
      { text: "奇迹每天都在发生。", film: "阿甘正传", director: "罗伯特·泽米吉斯", year: "1994", themeColor: "#253a4c" },
      { text: "赢得船票，是我一生中最幸运的事。", film: "泰坦尼克号", director: "詹姆斯·卡梅隆", year: "1997", themeColor: "#233c56" },
      { text: "不要吃太胖哦，会被杀掉的。", film: "千与千寻", director: "宫崎骏", year: "2001", themeColor: "#234335" },
      { text: "人生总是这么痛苦吗？还是只有小时候是这样？", film: "这个杀手不太冷", director: "吕克·贝松", year: "1994", themeColor: "#273322" },
      { text: "早安，我的公主。", film: "美丽人生", director: "罗伯托·贝尼尼", year: "1997", themeColor: "#5a3320" },
      { text: "爱是唯一可以超越时间与空间的事物。", film: "星际穿越", director: "克里斯托弗·诺兰", year: "2014", themeColor: "#101e3a" },
      { text: "最有韧性的寄生虫是什么？是想法。", film: "盗梦空间", director: "克里斯托弗·诺兰", year: "2010", themeColor: "#172d37" },
      { text: "假如再也见不到你，祝你早安、午安、晚安。", film: "楚门的世界", director: "彼得·威尔", year: "1998", themeColor: "#244d5c" },
      { text: "我不想只是生存，我想生活。", film: "机器人总动员", director: "安德鲁·斯坦顿", year: "2008", themeColor: "#5b431f" },
      { text: "阻止我的脚步的，并不是我所看见的东西，而是我所无法看见的东西。", film: "海上钢琴师", director: "朱塞佩·托纳多雷", year: "1998", themeColor: "#283e4d" },
      { text: "追求卓越，成功就会在不经意间追上你。", film: "三傻大闹宝莱坞", director: "拉吉库马尔·希拉尼", year: "2009", themeColor: "#5a3d18" },
      { text: "永远不要忘记你爱的人。", film: "忠犬八公的故事", director: "莱塞·霍尔斯道姆", year: "2009", themeColor: "#4a3523" },
      { text: "永远不要说永远，凡事皆有可能。", film: "放牛班的春天", director: "克里斯托夫·巴拉蒂", year: "2004", themeColor: "#503b1d" },
      { text: "有一天你会遇到一个彩虹般绚丽的人，从此以后，其他人不过是匆匆浮云。", film: "怦然心动", director: "罗伯·莱纳", year: "2010", themeColor: "#395026" },
      { text: "生活总会有点不顺意，我们都会犯错。", film: "疯狂动物城", director: "拜伦·霍华德 / 瑞奇·摩尔", year: "2016", themeColor: "#2f365d" },
      { text: "真正的死亡，是世界上再没有一个人记得你。", film: "寻梦环游记", director: "李·昂克里奇 / 阿德里安·莫利纳", year: "2017", themeColor: "#4d1e55" },
      { text: "我会给他一个无法拒绝的条件。", film: "教父", director: "弗朗西斯·福特·科波拉", year: "1972", themeColor: "#2b1512" },
      { text: "探戈里无所谓错步，不像人生。", film: "闻香识女人", director: "马丁·布莱斯特", year: "1992", themeColor: "#3b2a1d" },
      { text: "如果你有梦想，就要守护它。", film: "当幸福来敲门", director: "加布里埃莱·穆奇诺", year: "2006", themeColor: "#1d3b55" },
      { text: "这不是你的错。", film: "心灵捕手", director: "格斯·范·桑特", year: "1997", themeColor: "#2a3d52" },
      { text: "及时行乐，孩子们，让你们的人生不同凡响。", film: "死亡诗社", director: "彼得·威尔", year: "1989", themeColor: "#4a2f1d" },
      { text: "暴力永远不能取胜，保持尊严才会占上风。", film: "绿皮书", director: "彼得·法雷里", year: "2018", themeColor: "#274427" },
      { text: "我的意中人是个盖世英雄，有一天他会踩着七色云彩来娶我。", film: "大话西游之大圣娶亲", director: "刘镇伟", year: "1995", themeColor: "#4d2a55" },
      { text: "我不能替你背负它，但我可以背负你。", film: "指环王3：王者无敌", director: "彼得·杰克逊", year: "2003", themeColor: "#1f3a27" },
      { text: "这枚戒指，本可以多救一个人。", film: "辛德勒的名单", director: "史蒂文·斯皮尔伯格", year: "1993", themeColor: "#2c2c2b" },
      { text: "偏见总是蒙蔽真相。", film: "十二怒汉", director: "西德尼·吕美特", year: "1957", themeColor: "#2b2b2b" },
      { text: "人生不能像做菜，把所有的料都准备好了才下锅。", film: "饮食男女", director: "李安", year: "1994", themeColor: "#5b2f1a" },
      { text: "其实我是一个演员。", film: "喜剧之王", director: "周星驰 / 李力持", year: "1999", themeColor: "#4f2739" },
      { text: "出来混，迟早要还的。", film: "无间道", director: "刘伟强 / 麦兆辉", year: "2002", themeColor: "#172438" },
      { text: "让子弹飞一会儿。", film: "让子弹飞", director: "姜文", year: "2010", themeColor: "#5a2d16" },
      { text: "罗马，当然是罗马。", film: "罗马假日", director: "威廉·惠勒", year: "1953", themeColor: "#3e3a50" },
      { text: "根要扎在土壤里，和风一起生存。", film: "天空之城", director: "宫崎骏", year: "1986", themeColor: "#1e4053" },
      { text: "谢谢你带给我的冒险，现在去开始新的吧。", film: "飞屋环游记", director: "彼特·道格特", year: "2009", themeColor: "#334c63" },
      { text: "世界上只有一种病，穷病。", film: "我不是药神", director: "文牧野", year: "2018", themeColor: "#3a4424" },
      { text: "至少我试过了。", film: "飞越疯人院", director: "米洛斯·福尔曼", year: "1975", themeColor: "#303b2e" },
      { text: "你拥有的东西最终会拥有你。", film: "搏击俱乐部", director: "大卫·芬奇", year: "1999", themeColor: "#32151a" },
      { text: "我猜人生就是不断地放下，可惜的是，我们没有好好告别。", film: "少年派的奇幻漂流", director: "李安", year: "2012", themeColor: "#1d405c" },
      { text: "如果你不出去走走，你就会以为这就是世界。", film: "天堂电影院", director: "朱塞佩·托纳多雷", year: "1988", themeColor: "#4c321c" },
      { text: "我只能告诉你门在哪里，你必须自己走过去。", film: "黑客帝国", director: "莉莉·沃卓斯基 / 拉娜·沃卓斯基", year: "1999", themeColor: "#123b2b" },
      { text: "过去是痛楚的，但我认为你可以逃避，也可以向它学习。", film: "狮子王", director: "罗杰·阿勒斯 / 罗伯·明可夫", year: "1994", themeColor: "#5a3514" },
      { text: "人民不应该害怕政府，政府应该害怕人民。", film: "V字仇杀队", director: "詹姆斯·麦克特格", year: "2005", themeColor: "#2f1625" },
      { text: "要么作为英雄死去，要么活得够久，亲眼看着自己变成恶人。", film: "蝙蝠侠：黑暗骑士", director: "克里斯托弗·诺兰", year: "2008", themeColor: "#111c2a" },
      { text: "不要怜悯死者，哈利，怜悯活人。", film: "哈利·波特与死亡圣器(下)", director: "大卫·叶茨", year: "2011", themeColor: "#2b2044" },
      { text: "有时候，正是那些无人看好的人，成就了无人能及的事。", film: "模仿游戏", director: "莫滕·泰杜姆", year: "2014", themeColor: "#223646" },
      { text: "最好的计划就是没有计划。", film: "寄生虫", director: "奉俊昊", year: "2019", themeColor: "#203a2f" },
      { text: "我要起诉我的父母，因为他们生下了我。", film: "何以为家", director: "娜丁·拉巴基", year: "2018", themeColor: "#4a2f22" },
      { text: "在幻变的生命里，岁月，原是最大的小偷。", film: "岁月神偷", director: "罗启锐", year: "2010", themeColor: "#46321f" },
      { text: "还有谁？", film: "功夫", director: "周星驰", year: "2004", themeColor: "#3f1e17" },
      { text: "童年最珍贵的，是相信奇迹会来到身边。", film: "龙猫", director: "宫崎骏", year: "1988", themeColor: "#2c4a35" },
      { text: "让你的心，去带你想去的地方。", film: "哈尔的移动城堡", director: "宫崎骏", year: "2004", themeColor: "#234d5b" },
      { text: "起风了，唯有努力生存。", film: "起风了", director: "宫崎骏", year: "2013", themeColor: "#314a5b" },
      { text: "再美好的童年，也敌不过一场战争。", film: "萤火虫之墓", director: "高畑勋", year: "1988", themeColor: "#2a2622" },
      { text: "死亡，可能只是一扇通往下一程的门。", film: "入殓师", director: "泷田洋二郎", year: "2008", themeColor: "#2a2e3a" },
      { text: "你好吗？我很好。", film: "情书", director: "岩井俊二", year: "1995", themeColor: "#20354a" },
      { text: "无论你在世界的哪个角落，我都会再去寻找你。", film: "你的名字", director: "新海诚", year: "2016", themeColor: "#1d3651" },
      { text: "我以为是终点，却原来是开始。", film: "爱在黎明破晓前", director: "理查德·林克莱特", year: "1995", themeColor: "#3e2e54" },
      { text: "记住，你也只是一个普通人。", film: "末代皇帝", director: "贝纳尔多·贝托鲁奇", year: "1987", themeColor: "#4a2316" },
      { text: "他从不怜悯我，所以我愿意跟着他。", film: "触不可及", director: "奥利维埃·纳卡什 / 艾力克·托兰达", year: "2011", themeColor: "#2d3924" },
      { text: "幸福，藏在生活的细枝末节里。", film: "天使爱美丽", director: "让-皮埃尔·热内", year: "2001", themeColor: "#5b2a30" },
      { text: "这个世界很美好，值得为之奋斗。", film: "七宗罪", director: "大卫·芬奇", year: "1995", themeColor: "#1f1c1f" },
      { text: "你想看见秘密，其实是想被骗。", film: "致命魔术", director: "克里斯托弗·诺兰", year: "2006", themeColor: "#1a1d2a" },
      { text: "我看见你。", film: "阿凡达", director: "詹姆斯·卡梅隆", year: "2009", themeColor: "#14304a" },
      { text: "我把一生最美好的时光，都用来怀念你。", film: "美国往事", director: "赛尔乔·莱昂内", year: "1984", themeColor: "#3b271a" },
      { text: "时间带走了一切，却带不走那时你的样子。", film: "西西里的美丽传说", director: "朱塞佩·托纳多雷", year: "2000", themeColor: "#4d2a1c" },
      { text: "如果你愿意相信，世界就会变得明亮。", film: "海蒂和爷爷", director: "阿兰·葛斯彭纳", year: "2015", themeColor: "#3a4b1f" },
      { text: "在我所有的方程里，最神奇的一行写着：你。", film: "美丽心灵", director: "朗·霍华德", year: "2001", themeColor: "#233248" },
      { text: "世上最危险的两个字，是'还行'。", film: "爆裂鼓手", director: "达米恩·查泽雷", year: "2014", themeColor: "#2a1417" },
      { text: "敬那些做梦的人，敬那些会犯傻的心。", film: "爱乐之城", director: "达米恩·查泽雷", year: "2016", themeColor: "#2c1f4a" },
      { text: "金牌属于敢相信自己的人。", film: "摔跤吧！爸爸", director: "涅提·蒂瓦里", year: "2016", themeColor: "#4a2a16" },
      { text: "末日来临时，最难守住的是人性。", film: "釜山行", director: "延尚昊", year: "2016", themeColor: "#1c1f24" },
      { text: "每个人手机里，都藏着一个陌生的自己。", film: "完美陌生人", director: "保罗·杰诺维塞", year: "2016", themeColor: "#2c2333" },
      { text: "握紧拳头，里面什么也没有。", film: "卧虎藏龙", director: "李安", year: "2000", themeColor: "#1f3a2a" },
      { text: "人是为活着本身而活着。", film: "活着", director: "张艺谋", year: "1994", themeColor: "#4a2a1c" },
      { text: "我们那时没有爱情，只有发疯一样的喜欢。", film: "阳光灿烂的日子", director: "姜文", year: "1994", themeColor: "#5b3a1c" },
      { text: "胜的是村子，不是我们。", film: "七武士", director: "黑泽明", year: "1954", themeColor: "#2c2820" },
      { text: "每个人讲述的真相，都是为了自己。", film: "罗生门", director: "黑泽明", year: "1950", themeColor: "#2a2418" },
      { text: "我命由我不由天。", film: "哪吒之魔童降世", director: "饺子", year: "2019", themeColor: "#4d1c20" },
      { text: "希望是我们这个时代像钻石一样珍贵的东西。", film: "流浪地球", director: "郭帆", year: "2019", themeColor: "#1d2a3a" },
      { text: "万物皆有灵，心怀慈悲。", film: "大鱼海棠", director: "梁旋 / 张春", year: "2016", themeColor: "#1a3a4d" },
      { text: "美好的事物，能在平凡的日子里一直发光。", film: "海街日记", director: "是枝裕和", year: "2015", themeColor: "#2c4a3a" },
      { text: "我喜欢的，是一直追着他的自己。", film: "千年女优", director: "今敏", year: "2001", themeColor: "#4a1c2c" },
      { text: "有些人只听从自己心里的声音。", film: "燃情岁月", director: "爱德华·兹威克", year: "1994", themeColor: "#4d2614" },
      { text: "音乐让灵魂在黑暗中依然挺立。", film: "钢琴家", director: "罗曼·波兰斯基", year: "2002", themeColor: "#2a2620" },
      /* __INSERT_BATCH_1__ */
      { text: "永远不要相信你看见的所有表象。", film: "控方证人", director: "比利·怀尔德", year: "1957", themeColor: "#2a2418" },
      { text: "决定我们成为什么样的人，不是我们的能力，而是我们的选择。", film: "哈利·波特与魔法石", director: "克里斯·哥伦布", year: "2001", themeColor: "#2b2044" },
      { text: "爸爸要去的地方，素媛就跟着去。", film: "素媛", director: "李濬益", year: "2013", themeColor: "#3a2a2a" },
      { text: "有时候，说谎比说真话还累。", film: "猫鼠游戏", director: "史蒂文·斯皮尔伯格", year: "2002", themeColor: "#1d324a" },
      { text: "大哥大嫂过年好，你是我的爷我是你的儿。", film: "鬼子来了", director: "姜文", year: "2000", themeColor: "#4a2419" },
      { text: "般若波罗蜜。", film: "大话西游之月光宝盒", director: "刘镇伟", year: "1995", themeColor: "#4d2a55" },
      { text: "天还没破晓，但黑夜已被划开。", film: "指环王2：双塔奇兵", director: "彼得·杰克逊", year: "2002", themeColor: "#1f3a27" },
      { text: "皇帝轮流做，明年到我家。", film: "大闹天宫", director: "万籁鸣", year: "1961", themeColor: "#5a2418" },
      { text: "我们要决定的，是如何使用上天给的时间。", film: "指环王1：护戒使者", director: "彼得·杰克逊", year: "2001", themeColor: "#1f3a27" },
      { text: "永远不要让家族之外的人知道你在想什么。", film: "教父2", director: "弗朗西斯·福特·科波拉", year: "1974", themeColor: "#2b1512" },
      { text: "国家应当属于人民，不该高于人民。", film: "辩护人", director: "杨宇硕", year: "2013", themeColor: "#2a2c2e" },
      { text: "做你想做的人，没有时间的限制。", film: "本杰明·巴顿奇事", director: "大卫·芬奇", year: "2008", themeColor: "#2c2820" },
      { text: "童年最贵的礼物，是没有围栏的友情。", film: "穿条纹睡衣的男孩", director: "马克·赫尔曼", year: "2008", themeColor: "#2c2c2b" },
      { text: "献给好人的奏鸣曲。", film: "窃听风暴", director: "弗洛里安·亨克尔·冯·多纳斯马克", year: "2006", themeColor: "#1a2438" },
      { text: "总有一些事情比金钱更重要，但都需要花钱。", film: "两杆大烟枪", director: "盖·里奇", year: "1998", themeColor: "#2f2a18" },
      { text: "上帝关上一扇门，必会为你打开另一扇窗。", film: "音乐之声", director: "罗伯特·怀斯", year: "1965", themeColor: "#3a4b1f" },
      { text: "魔鬼，都藏在细节里。", film: "看不见的客人", director: "奥里奥尔·保罗", year: "2016", themeColor: "#20272f" },
      { text: "好好活下去。", film: "拯救大兵瑞恩", director: "史蒂文·斯皮尔伯格", year: "1998", themeColor: "#2c2c2b" },
      { text: "等我长大，我就给妹妹买一双新鞋。", film: "小鞋子", director: "马吉德·马吉迪", year: "1997", themeColor: "#3b2a1d" },
      { text: "你为什么不告诉我那只是计谋？", film: "沉默的羔羊", director: "乔纳森·戈姆", year: "1991", themeColor: "#2a2418" },
      { text: "我们都被困在自己想象的酒店里。", film: "布达佩斯大饭店", director: "韦斯·安德森", year: "2014", themeColor: "#5a3320" },
      { text: "你最深的恐惧，正是你逃避的真相。", film: "禁闭岛", director: "马丁·斯科塞斯", year: "2010", themeColor: "#1f242c" },
      { text: "你永远不知道自己改变了什么，又错过了什么。", film: "蝴蝶效应", director: "埃里克·布雷斯", year: "2004", themeColor: "#1d2436" },
      { text: "你愿意看，是因为我给你看的，比真相更迷人。", film: "致命魔术", director: "克里斯托弗·诺兰", year: "2006", themeColor: "#1f1f24" },
      { text: "时间会带走一切，除了一个孩子的勇气。", film: "哈利·波特与阿兹卡班的囚徒", director: "阿方索·卡隆", year: "2004", themeColor: "#2b2044" },
      { text: "每个伟大的演员都不是天生的，是被生活逼出来的。", film: "超脱", director: "托尼·凯耶", year: "2011", themeColor: "#2a2a2a" },
      { text: "向乌玛瑟曼跳舞那样去活。", film: "低俗小说", director: "昆汀·塔伦蒂诺", year: "1994", themeColor: "#3c1a1d" },
      { text: "海豚的微笑，是世界上最大的谎言。", film: "海豚湾", director: "路易·西霍尤斯", year: "2009", themeColor: "#1a3a4d" },
      { text: "我宁愿做一个机器人，也不愿做一个失业的工人。", film: "摩登时代", director: "查理·卓别林", year: "1936", themeColor: "#2a2a2a" },
      { text: "好的过去并不会因为糟糕的现在而失去意义。", film: "美国往事", director: "赛尔乔·莱昂内", year: "1984", themeColor: "#3a2a1d" },
      { text: "我对你的崇拜，就像滔滔江水绵延不绝。", film: "喜剧之王", director: "周星驰 / 李力持", year: "1999", themeColor: "#4f2739" },
      { text: "真相只有一个，看你愿不愿意承认。", film: "致命ID", director: "詹姆斯·曼高德", year: "2003", themeColor: "#20272f" },
      { text: "1986年的雨夜，是一座城市永远抹不掉的痕迹。", film: "杀人回忆", director: "奉俊昊", year: "2003", themeColor: "#2a2418" },
      { text: "梦不是逃避现实的地方，而是认识自己的地方。", film: "红辣椒", director: "今敏", year: "2006", themeColor: "#4a1c2c" },
      { text: "你看到了什么，并不重要，重要的是你怎么去想。", film: "七宗罪", director: "大卫·芬奇", year: "1995", themeColor: "#1f1f1f" },
      { text: "原来魔法就藏在勇气的另一面。", film: "哈利·波特与密室", director: "克里斯·哥伦布", year: "2002", themeColor: "#2b2044" },
      { text: "如果你不能成为传奇，那就成为麻烦。", film: "加勒比海盗", director: "戈尔·维宾斯基", year: "2003", themeColor: "#2a2620" },
      { text: "一一是一个人，也是一切。", film: "一一", director: "杨德昌", year: "2000", themeColor: "#1f3043" },
      { text: "你怎么能用一句话定义一个人？", film: "狩猎", director: "托马斯·温特伯格", year: "2012", themeColor: "#2a2c2e" },
      { text: "凡是过去，皆为序章。", film: "唐伯虎点秋香", director: "李力持", year: "1993", themeColor: "#4a2d16" },
      { text: "请相信世上还有奇迹。", film: "7号房的礼物", director: "李焕庆", year: "2013", themeColor: "#3a2a2a" },
      { text: "如果是为了你而努力，再苦也是甜的。", film: "被嫌弃的松子的一生", director: "中岛哲也", year: "2006", themeColor: "#4d1c4d" },
      { text: "你为什么如此严肃？", film: "蝙蝠侠：黑暗骑士崛起", director: "克里斯托弗·诺兰", year: "2012", themeColor: "#111c2a" },
      { text: "把我的名字给你，把你的名字给我。", film: "请以你的名字呼唤我", director: "卢卡·瓜达尼诺", year: "2017", themeColor: "#3a3520" },
      { text: "我希望和你一起，看尽日出与日落。", film: "爱在黎明破晓前", director: "理查德·林克莱特", year: "1995", themeColor: "#3a3a4a" },
      { text: "我猜，每个人心里都有一座断背山。", film: "断背山", director: "李安", year: "2005", themeColor: "#2c3a2a" },
      { text: "他唯一不能做的，就是触碰他爱的人。", film: "剪刀手爱德华", director: "蒂姆·伯顿", year: "1990", themeColor: "#2c1f2c" },
      { text: "我看见死人。", film: "第六感", director: "M·奈特·沙马兰", year: "1999", themeColor: "#2a2a2a" },
      { text: "我会照顾自己的，先生。", film: "超能陆战队", director: "唐·霍尔 / 克里斯·威廉姆斯", year: "2014", themeColor: "#2a3a55" },
      { text: "你是我生命里的一首歌，我会一直听下去。", film: "甜蜜蜜", director: "陈可辛", year: "1996", themeColor: "#5a3320" },
      { text: "可以夺走我们的生命，但夺不走我们的自由。", film: "勇敢的心", director: "梅尔·吉布森", year: "1995", themeColor: "#2c3a4a" },
      { text: "万物有灵，皆有归宿。", film: "幽灵公主", director: "宫崎骏", year: "1997", themeColor: "#234335" },
      { text: "回忆是会被一点点改写的，但感受不会。", film: "爱在日落黄昏时", director: "理查德·林克莱特", year: "2004", themeColor: "#3a3a4a" },
      { text: "夏天是用来记住一个人的。", film: "菊次郎的夏天", director: "北野武", year: "1999", themeColor: "#2c4a3a" },
      { text: "我哥哥不是我哥哥，但我得叫他哥哥。", film: "借东西的小人阿莉埃蒂", director: "米林宏昌", year: "2010", themeColor: "#314a5b" },
      { text: "我并没有真的失去她，是她失去了真实的自己。", film: "消失的爱人", director: "大卫·芬奇", year: "2014", themeColor: "#2a2a2c" },
      { text: "孩子，没有人会真正消失。", film: "无人知晓", director: "是枝裕和", year: "2004", themeColor: "#2c4a3a" },
      { text: "你拥有的世界，从来不是完美的。", film: "完美的世界", director: "克林特·伊斯特伍德", year: "1993", themeColor: "#2a2c2e" },
      { text: "每个女孩心里都住着一位天使。", film: "天使爱美丽", director: "让-皮埃尔·热内", year: "2001", themeColor: "#5a2418" },
      { text: "人鬼殊途，缘起缘灭。", film: "倩女幽魂", director: "程小东", year: "1987", themeColor: "#4d2a55" },
      { text: "夏天蝉鸣，森林安静，我在长大。", film: "小森林 夏秋篇", director: "森淳一", year: "2014", themeColor: "#314a5b" },
      { text: "如果可以再活一次，我还是会爱你。", film: "时空恋旅人", director: "理查德·柯蒂斯", year: "2013", themeColor: "#3a3a4a" },
      { text: "梦境与现实，最终都是同一个房间。", film: "未麻的部屋", director: "今敏", year: "1997", themeColor: "#2a1f2c" },
      { text: "我不能再让你走进我的火焰里。", film: "哈利·波特与火焰杯", director: "迈克·内威尔", year: "2005", themeColor: "#2b2044" },
      { text: "用心去听，就能听见声音背后的世界。", film: "侧耳倾听", director: "近藤喜文", year: "1995", themeColor: "#234335" },
      { text: "你不是一个人在飞。", film: "驯龙高手", director: "迪恩·德布洛斯 / 克里斯·桑德斯", year: "2010", themeColor: "#1d3a4a" },
      { text: "有时候，我们以为是终点，其实是新的起点。", film: "幸福终点站", director: "史蒂文·斯皮尔伯格", year: "2004", themeColor: "#244d5c" },
      { text: "活着真的没什么意思，除非你愿意为别人活一下。", film: "一个叫欧维的男人决定去死", director: "汉内斯·赫尔姆", year: "2015", themeColor: "#2c2a25" },
      { text: "冬天的雪，是大地写给春天的信。", film: "小森林 冬春篇", director: "森淳一", year: "2015", themeColor: "#3a4b4a" },
      { text: "做你害怕的事，然后微笑。", film: "怪兽电力公司", director: "彼特·道格特", year: "2001", themeColor: "#274427" },
      { text: "永远不要恨你的对手，它会蒙蔽你的判断。", film: "教父3", director: "弗朗西斯·福特·科波拉", year: "1990", themeColor: "#2b1512" },
      { text: "再见了，伙计，我会永远记得你。", film: "玩具总动员3", director: "李·昂克里奇", year: "2010", themeColor: "#4a2d16" },
      { text: "傲慢使别人无法爱我，偏见使我无法爱人。", film: "傲慢与偏见", director: "乔·赖特", year: "2005", themeColor: "#3a3a4a" },
      { text: "在新世界里，谁先开口认错，谁就输了。", film: "新世界", director: "朴勋政", year: "2013", themeColor: "#1d242c" },
      { text: "森林里的萤火虫，是亡灵留给生者的灯。", film: "萤火之森", director: "大森贵弘", year: "2011", themeColor: "#1c3a2c" },
      { text: "我请客，您说话。", film: "茶馆", director: "谢添", year: "1982", themeColor: "#4a2a1c" },
      { text: "你要为自己的自由付出代价。", film: "被解救的姜戈", director: "昆汀·塔伦蒂诺", year: "2012", themeColor: "#3c1a1d" },
      { text: "我们都被分配了角色，只是有人不肯演下去。", film: "神偷奶爸", director: "皮埃尔·考芬 / 克里斯·雷诺德", year: "2010", themeColor: "#3a2a55" },
      { text: "我有罪。", film: "告白", director: "中岛哲也", year: "2010", themeColor: "#1f242c" },
      { text: "大圣，此去欲何？踏南天，碎凌霄。", film: "哪吒闹海", director: "严定宪 / 王树忱 / 徐景达", year: "1979", themeColor: "#5a2418" },
      { text: "如果你不能爱真实的自己，没人能替你做到。", film: "玛丽和马克思", director: "亚当·艾略特", year: "2009", themeColor: "#2c2820" },
      { text: "色易守，情难防。", film: "色，戒", director: "李安", year: "2007", themeColor: "#3a1f24" },
      { text: "升官发财请走别路，贪生怕死莫入此门。", film: "九品芝麻官", director: "王晶", year: "1994", themeColor: "#4a2d16" },
      { text: "你比孩子的世界还要大。", film: "大鱼", director: "蒂姆·伯顿", year: "2003", themeColor: "#3a2a55" },
      { text: "饮食男女，人之大欲。", film: "喜宴", director: "李安", year: "1993", themeColor: "#5b2f1a" },
      { text: "我们不是相同的人，所以才需要彼此。", film: "模仿游戏", director: "莫滕·泰杜姆", year: "2014", themeColor: "#223646" },
      { text: "现实比游戏更值得你认真对待。", film: "头号玩家", director: "史蒂文·斯皮尔伯格", year: "2018", themeColor: "#2a3a55" },
      { text: "他们以为我会一辈子做小角色，可我偏要做主角。", film: "射雕英雄传之东成西就", director: "刘镇伟", year: "1993", themeColor: "#4d2a55" },
      { text: "情绪没有好坏，每一种都是你。", film: "头脑特工队", director: "彼特·道格特", year: "2015", themeColor: "#2f365d" },
      { text: "你不需要变得不一样，就值得被爱。", film: "我是山姆", director: "杰茜·尼尔森", year: "2001", themeColor: "#395026" },
      { text: "我们都曾经那样年轻，那样不舍。", film: "阳光姐妹淘", director: "姜炯哲", year: "2011", themeColor: "#5a3320" },
      { text: "纵使万劫不复，纵使疾风骤雨。", film: "血战钢锯岭", director: "梅尔·吉布森", year: "2016", themeColor: "#3a2620" },
      { text: "全世界都在看，我们却找不到一个倾听者。", film: "恐怖直播", director: "金秉佑", year: "2013", themeColor: "#1f242c" },
      { text: "她从未离开，她只是一直在看着我。", film: "惊魂记", director: "阿尔弗雷德·希区柯克", year: "1960", themeColor: "#1f1f24" },
      { text: "选择是真实的，无论是哪一种。", film: "黑客帝国3：矩阵革命", director: "莉莉·沃卓斯基 / 拉娜·沃卓斯基", year: "2003", themeColor: "#123b2b" },
      { text: "无论你在世界的哪个角落，我都会再去寻找你。", film: "你的名字。", director: "新海诚", year: "2016", themeColor: "#3a3a4a" },
      { text: "如果你犯了罪，你会得到惩罚。", film: "三块广告牌", director: "马丁·麦克唐纳", year: "2017", themeColor: "#3a1f24" },
      { text: "你愿意玩一个游戏吗？", film: "电锯惊魂", director: "詹姆斯·温", year: "2004", themeColor: "#2a1417" },
      { text: "活着的每一秒，都不应该被浪费。", film: "达拉斯买家俱乐部", director: "让-马克·瓦雷", year: "2013", themeColor: "#3b2a1d" },
      { text: "每个人都有秘密，每个秘密都是一座迷宫。", film: "心迷宫", director: "忻钰坤", year: "2014", themeColor: "#1f242c" },
      { text: "新的不一定是更好的，但旧的我们也不再属于。", film: "疯狂原始人", director: "柯克·德米科 / 克里斯·桑德斯", year: "2013", themeColor: "#4a2d16" },
      { text: "我没有名字，没有过去，只有任务。", film: "谍影重重3", director: "保罗·格林格拉斯", year: "2007", themeColor: "#1d2436" },
      { text: "兄弟如手足，女人如衣服。", film: "英雄本色", director: "吴宇森", year: "1986", themeColor: "#1d2436" },
      { text: "上帝之城，是被遗忘的人写下的史诗。", film: "上帝之城", director: "费尔南多·梅雷莱斯", year: "2002", themeColor: "#5a3320" },
      { text: "风是大地的呼吸，我们只是经过的人。", film: "风之谷", director: "宫崎骏", year: "1984", themeColor: "#234d5b" },
      { text: "我们之间没有未来，只有一夜的午夜。", film: "爱在午夜降临前", director: "理查德·林克莱特", year: "2013", themeColor: "#3a3a4a" },
      { text: "我们都活着，是因为有一双手愿意为我们撑伞。", film: "绿里奇迹", director: "弗兰克·德拉邦特", year: "1999", themeColor: "#2c4a3a" },
      { text: "兄弟一旦上路，便不再回头。", film: "纵横四海", director: "吴宇森", year: "1991", themeColor: "#1d2436" },
      { text: "你想我笑成什么样？", film: "小丑", director: "托德·菲利普斯", year: "2019", themeColor: "#2c1f4a" },
      { text: "饭店关上门，世界就消失了。", film: "卢旺达饭店", director: "特里·乔治", year: "2004", themeColor: "#3b2a1d" },
      { text: "人都是有两张脸的，区别是你愿不愿意承认。", film: "背靠背，脸对脸", director: "黄建新", year: "1994", themeColor: "#3a2a1d" },
      { text: "我只想记得自己是谁。", film: "记忆碎片", director: "克里斯托弗·诺兰", year: "2000", themeColor: "#1f242c" },
      { text: "也许我们都需要一个理由继续走下去。", film: "心灵奇旅", director: "彼特·道格特", year: "2020", themeColor: "#2a3a55" },
      { text: "我顶你个肺。", film: "疯狂的石头", director: "宁浩", year: "2006", themeColor: "#4a2d16" },
      { text: "若是有心，请尽情吵闹这世界。", film: "雨中曲", director: "斯坦利·多南", year: "1952", themeColor: "#3a3a4a" },
      { text: "我看到了星辰大海，也看到了空旷孤独。", film: "2001太空漫游", director: "斯坦利·库布里克", year: "1968", themeColor: "#101e3a" },
      { text: "我已经不是当年的那个我了。", film: "无间道2", director: "刘伟强 / 麦兆辉", year: "2003", themeColor: "#172438" },
      { text: "活了一辈子，就指望能记得几个名字。", film: "忠犬八公物语", director: "神山征二郎", year: "1987", themeColor: "#4a3523" },
      { text: "我们不是一家人，但我们一起吃饭。", film: "小偷家族", director: "是枝裕和", year: "2018", themeColor: "#2c4a3a" },
      { text: "世界从来不温柔，但故事可以。", film: "荒蛮故事", director: "达米安·斯兹弗隆", year: "2014", themeColor: "#3a2620" },
      { text: "你可以打败我，但你打不死我心里那个节拍。", film: "无敌破坏王", director: "瑞奇·摩尔", year: "2012", themeColor: "#2a3a55" },
      { text: "不是我的节奏，是这个时代的。", film: "爆裂鼓手", director: "达米恩·查泽雷", year: "2014", themeColor: "#2a1417" },
      { text: "今天看到松鼠了吗？", film: "冰川时代", director: "克里斯·韦奇", year: "2002", themeColor: "#314a5b" },
      { text: "船上有几个人，没有人能告诉我。", film: "恐怖游轮", director: "克里斯托弗·史密斯", year: "2009", themeColor: "#1f242c" },
      { text: "少年的世界里，连星空都是潮湿的。", film: "牯岭街少年杀人事件", director: "杨德昌", year: "1991", themeColor: "#1f3043" },
      { text: "命运给的，不一定是你想要的。", film: "贫民窟的百万富翁", director: "丹尼·博伊尔", year: "2008", themeColor: "#5a3320" },
      { text: "圣诞节就是孩子，孩子就是希望。", film: "东京教父", director: "今敏", year: "2003", themeColor: "#4a1c2c" },
      { text: "你被这个时代抛弃了，并没有人通知过你。", film: "东邪西毒", director: "王家卫", year: "1994", themeColor: "#3a2a1d" },
      { text: "出门要带着面包，更要带着勇气。", film: "魔女宅急便", director: "宫崎骏", year: "1989", themeColor: "#395026" },
      { text: "如果今天是你生命的最后一天，你还会做你现在做的事吗？", film: "遗愿清单", director: "罗伯·莱纳", year: "2007", themeColor: "#3b2a1d" },
      { text: "看似偶然的相遇，其实都是命运的安排。", film: "大佛普拉斯", director: "黄信尧", year: "2017", themeColor: "#2a2a2a" },
      { text: "我看起来好像很好吃。", film: "你看起来好像很好吃", director: "藤森雅也", year: "2010", themeColor: "#4d2a16" },
      { text: "美丽的羚羊，奔跑在风里。", film: "可可西里", director: "陆川", year: "2004", themeColor: "#3a2620" },
      { text: "完美来自一寸一寸的痛苦。", film: "黑天鹅", director: "达伦·阿罗诺夫斯基", year: "2010", themeColor: "#1f1f24" },
      { text: "城市的光，会找到该被照亮的人。", film: "城市之光", director: "查理·卓别林", year: "1931", themeColor: "#2a2a2a" },
      { text: "如果你可以回到过去，你会停在哪一秒？", film: "源代码", director: "邓肯·琼斯", year: "2011", themeColor: "#1d2436" },
      { text: "圣诞节真正的礼物，是有人想着你。", film: "真爱至上", director: "理查德·柯蒂斯", year: "2003", themeColor: "#3a3a4a" },
      { text: "我们无法对一个失去亲人的男人说，没事的。", film: "海边的曼彻斯特", director: "肯尼斯·罗纳根", year: "2016", themeColor: "#1d3a4a" },
      { text: "我们一直被告诉要笑着活下去。", film: "末路狂花", director: "雷德利·斯科特", year: "1991", themeColor: "#3c1416" },
      { text: "这就是真实的人生。", film: "波西米亚狂想曲", director: "布莱恩·辛格", year: "2018", themeColor: "#2c1f4a" },
      { text: "我的兄弟是我所有的天赋。", film: "雨人", director: "巴瑞·莱文森", year: "1988", themeColor: "#3b2a1d" },
      { text: "我喜欢上你了，这是我做过最勇敢的事。", film: "初恋这件小事", director: "蓬蓬·塔纳查诺克", year: "2010", themeColor: "#5a2418" },
      { text: "千年之后，谁还记得我是青蛇。", film: "青蛇", director: "徐克", year: "1993", themeColor: "#1f3a2a" },
      { text: "也许有一天，所有的孤独都会被看见。", film: "人工智能", director: "史蒂文·斯皮尔伯格", year: "2001", themeColor: "#1f242c" },
      { text: "我会爱你，从这一秒，到下一辈子。", film: "恋恋笔记本", director: "尼克·卡萨维茨", year: "2004", themeColor: "#3a3a4a" },
      { text: "对啊，简直就是个奇迹。", film: "虎口脱险", director: "杰拉尔·乌里", year: "1966", themeColor: "#5a3320" },
      { text: "见证我！", film: "疯狂的麦克斯4：狂暴之路", director: "乔治·米勒", year: "2015", themeColor: "#3c1416" },
      { text: "未来不是命中注定，是我们走出来的。", film: "终结者2：审判日", director: "詹姆斯·卡梅隆", year: "1991", themeColor: "#3c1416" },
      { text: "孔子曰：知之为知之，不知为不知。", film: "新龙门客栈", director: "李惠民", year: "1992", themeColor: "#3a2a1d" },
      { text: "做人嘛，最重要的是开心。", film: "芙蓉镇", director: "谢晋", year: "1986", themeColor: "#4a2a1c" },
      { text: "好故事就该被讲到最后一行。", film: "无耻混蛋", director: "昆汀·塔伦蒂诺", year: "2009", themeColor: "#3c1a1d" },
      { text: "命运并不在意你是否有资格。", film: "千钧一发", director: "安德鲁·尼科尔", year: "1997", themeColor: "#1d2436" },
      { text: "海是有记忆的，会把丢掉的人送回来。", film: "崖上的波妞", director: "宫崎骏", year: "2008", themeColor: "#1a3a4d" },
      { text: "我们曾相爱，想到就心酸。", film: "花束般的恋爱", director: "土井裕泰", year: "2021", themeColor: "#3a3a4a" },
      { text: "夜走入夜，我们便看见彼此。", film: "彗星来的那一夜", director: "詹姆斯·沃德·布柯特", year: "2013", themeColor: "#1f242c" },
      { text: "勇气不是没有恐惧，而是带着恐惧出发。", film: "哈利·波特与死亡圣器(上)", director: "大卫·叶茨", year: "2010", themeColor: "#2b2044" },
      { text: "做你自己，因为别人都被人做过了。", film: "奇迹男孩", director: "斯蒂芬·卓博斯基", year: "2017", themeColor: "#2f365d" },

    const quotes = rawQuotes.map((item) => ({
      proofread: defaultProofread,
      source: "local",
      ...item
    }));

    const content = document.getElementById("content");
    const quote = document.getElementById("quote");
    const quotePanel = document.getElementById("quotePanel");
    const quoteGhost = document.getElementById("quoteGhost");
    const film = document.getElementById("film");
    const year = document.getElementById("year");
    const sourceMeter = document.getElementById("sourceMeter");
    const nextButton = document.getElementById("nextButton");
    const searchForm = document.getElementById("searchForm");
    const searchInput = document.getElementById("searchInput");
    const searchButton = document.getElementById("searchButton");
    const searchStatus = document.getElementById("searchStatus");
    const root = document.documentElement;
    const backdropLayers = Array.from(document.querySelectorAll(".backdrop-layer"));
    let currentIndex = -1;
    let activeBackdrop = 0;
    let quoteQueue = [];

    function pickQuote() {
      if (quoteQueue.length === 0) {
        quoteQueue = buildShuffledQueue(currentIndex);
      }
      currentIndex = quoteQueue.shift();
      return quotes[currentIndex];
    }

    function buildShuffledQueue(previousIndex) {
      const queue = quotes.map((_, index) => index);

      for (let index = queue.length - 1; index > 0; index -= 1) {
        const swapIndex = Math.floor(Math.random() * (index + 1));
        [queue[index], queue[swapIndex]] = [queue[swapIndex], queue[index]];
      }

      if (queue.length > 1 && queue[0] === previousIndex) {
        [queue[0], queue[1]] = [queue[1], queue[0]];
      }

      return queue;
    }

    function updateText(item) {
      const incomingText = `“${item.text}”`;
      const incomingSize = pickQuoteSize(item.text || "");
      const previousText = quote.textContent;
      const previousSize = quote.style.getPropertyValue("--quote-size");

      film.textContent = item.film;
      const meta = [item.director, item.year].filter(Boolean).join(" / ");
      year.textContent = meta || " ";
      const source = item.source === "online" ? "online" : "local";
      sourceMeter.dataset.source = source;
      if (source === "online") {
        sourceMeter.textContent = "联网";
      } else {
        const localIndex = currentIndex >= 0 ? currentIndex + 1 : quotes.indexOf(item) + 1;
        sourceMeter.textContent = `${localIndex} / ${quotes.length}`;
      }

      if (!previousText) {
        quote.textContent = incomingText;
        quote.style.setProperty("--quote-size", incomingSize);
        quotePanel.scrollTop = 0;
        return;
      }

      quoteGhost.textContent = previousText;
      if (previousSize) {
        quoteGhost.style.setProperty("--quote-size", previousSize);
      } else {
        quoteGhost.style.removeProperty("--quote-size");
      }
      quoteGhost.classList.add("is-prepping");

      quote.classList.add("is-prepping");
      quote.textContent = incomingText;
      quote.style.setProperty("--quote-size", incomingSize);
      quotePanel.scrollTop = 0;

      void quote.offsetWidth;

      requestAnimationFrame(() => {
        quote.classList.remove("is-prepping");
        quoteGhost.classList.remove("is-prepping");
      });
    }

    function pickQuoteSize(text) {
      return text.length <= 16
        ? "clamp(30px, 5.2vw, 48px)"
        : "clamp(24px, 4.0vw, 36px)";
    }

    function renderQuote(animate = true) {
      const item = pickQuote();
      applyTheme(item);
      updateText(item);
    }

    function applyTheme(item) {
      const theme = hexToRgb(item.themeColor);
      const deep = theme.map((value) => clamp(Math.round(value * 0.24), 6, 42));
      const card = theme.map((value) => clamp(Math.round(value * 0.36), 12, 74));
      const accent = theme.map((value) => clamp(Math.round(value * 1.36 + 42), 112, 238));
      const nextBackdrop = activeBackdrop === 0 ? 1 : 0;

      root.style.setProperty("--theme-rgb", theme.join(", "));
      root.style.setProperty("--theme-deep-rgb", deep.join(", "));
      root.style.setProperty("--card-rgb", card.join(", "));
      root.style.setProperty("--accent-rgb", accent.join(", "));
      backdropLayers[nextBackdrop].style.background = buildThemeGradient(theme, deep, accent);

      backdropLayers[nextBackdrop].classList.add("is-visible");
      backdropLayers[activeBackdrop].classList.remove("is-visible");
      activeBackdrop = nextBackdrop;
    }

    function buildThemeGradient(theme, deep, accent) {
      return `
        radial-gradient(circle at 22% 18%, rgba(${theme.join(", ")}, 0.62), transparent 32%),
        radial-gradient(circle at 78% 72%, rgba(${accent.join(", ")}, 0.26), transparent 36%),
        radial-gradient(circle at 48% 48%, rgba(${theme.join(", ")}, 0.22), transparent 44%),
        linear-gradient(135deg, rgb(${deep.join(", ")}) 0%, #0b0909 54%, rgba(${theme.join(", ")}, 0.86) 100%)
      `;
    }

    function hexToRgb(hex) {
      const normalized = hex.replace("#", "");
      const value = Number.parseInt(normalized, 16);
      return [value >> 16 & 255, value >> 8 & 255, value & 255];
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    const HITOKOTO_BUNDLE_URL = "https://cdn.jsdelivr.net/gh/hitokoto-osc/sentences-bundle@latest/sentences/h.json";
    const HITOKOTO_FALLBACK_URL = "https://v1.hitokoto.cn/?c=h&encode=json";

    let bundleCache = null;
    let bundlePromise = null;

    function setSearchBusy(busy) {
      searchButton.disabled = busy;
      searchInput.disabled = busy;
      searchButton.textContent = busy ? "搜索中" : "搜索";
    }

    function setSearchStatus(text) {
      searchStatus.textContent = text || "";
    }

    function findLocalQuote(query) {
      const normalized = query.replace(/\s+/g, "").toLowerCase();
      if (!normalized) return null;

      const matches = quotes.filter((item) => {
        const film = (item.film || "").replace(/\s+/g, "").toLowerCase();
        return film.includes(normalized) || normalized.includes(film);
      });

      if (matches.length === 0) return null;
      const pickIndex = Math.floor(Math.random() * matches.length);
      return matches[pickIndex];
    }

    async function loadHitokotoBundle() {
      if (bundleCache) return bundleCache;
      if (bundlePromise) return bundlePromise;

      bundlePromise = fetch(HITOKOTO_BUNDLE_URL, { cache: "force-cache" })
        .then((response) => {
          if (!response.ok) throw new Error("台词库下载失败 " + response.status);
          return response.json();
        })
        .then((data) => {
          if (!Array.isArray(data)) throw new Error("台词库格式异常");
          bundleCache = data;
          return data;
        })
        .catch((error) => {
          bundlePromise = null;
          throw error;
        });

      return bundlePromise;
    }

    function pickFromBundle(bundle, query) {
      const normalized = query.replace(/\s+/g, "").toLowerCase();
      if (!normalized) return null;

      const matches = bundle.filter((item) => {
        const from = (item.from || "").replace(/\s+/g, "").toLowerCase();
        return from && (from.includes(normalized) || normalized.includes(from));
      });

      if (matches.length === 0) return null;
      const chosen = matches[Math.floor(Math.random() * matches.length)];
      const film = (chosen.from || query).trim();
      const director = (chosen.from_who || "").trim();

      return {
        text: chosen.hitokoto,
        film,
        director: director || undefined,
        year: "",
        themeColor: computeMoodColor(chosen.hitokoto, film, director),
        source: "online"
      };
    }

    async function fetchOnlineQuote(query) {
      const response = await fetch(HITOKOTO_FALLBACK_URL, { cache: "no-store" });
      if (!response.ok) {
        throw new Error("接口返回 " + response.status);
      }
      const data = await response.json();
      if (!data || !data.hitokoto) {
        throw new Error("接口数据异常");
      }

      const film = (data.from || query || "未知影片").trim();
      const director = (data.from_who || "").trim();
      const themeColor = computeMoodColor(data.hitokoto, film, director);

      return {
        text: data.hitokoto,
        film,
        director: director || undefined,
        year: "",
        themeColor,
        source: "online"
      };
    }

    async function handleSearch(rawQuery) {
      const query = (rawQuery || "").trim();
      if (!query) {
        setSearchStatus("请输入电影名");
        return;
      }

      const local = findLocalQuote(query);
      if (local) {
        currentIndex = quotes.indexOf(local);
        quoteQueue = [];
        renderQuoteFromItem(local);
        setSearchStatus(`已为你找到《${local.film}》的金句`);
        return;
      }

      setSearchBusy(true);
      setSearchStatus("正在联网搜索台词…");
      try {
        const bundle = await loadHitokotoBundle();
        const matched = pickFromBundle(bundle, query);
        if (matched) {
          quoteQueue = [];
          currentIndex = -1;
          renderQuoteFromItem(matched);
          setSearchStatus(`已为你联网找到《${matched.film}》的台词`);
          return;
        }

        const online = await fetchOnlineQuote(query);
        quoteQueue = [];
        currentIndex = -1;
        renderQuoteFromItem(online);
        setSearchStatus(
          online.film && online.film !== query
            ? `没有匹配《${query}》，已为你随机抽取《${online.film}》的影视金句`
            : "没有匹配的电影，已为你随机抽取一条影视金句"
        );
      } catch (error) {
        setSearchStatus("没能联网获取台词：" + error.message);
      } finally {
        setSearchBusy(false);
      }
    }

    function renderQuoteFromItem(item) {
      applyTheme(item);
      updateText(item);
    }

    function computeMoodColor(text, film, director) {
      const seed = `${film || ""}|${director || ""}|${text || ""}`;
      const hash = hashString(seed);

      const moodScore = scoreMood(text + " " + (film || ""));
      const hueAnchor = pickHueAnchor(moodScore, hash);
      const saturation = clamp(0.32 + ((hash >>> 8) & 0xff) / 255 * 0.22, 0.32, 0.58);
      const lightness = clamp(0.18 + ((hash >>> 16) & 0xff) / 255 * 0.12, 0.16, 0.32);

      const [r, g, b] = hslToRgb(hueAnchor / 360, saturation, lightness);
      return rgbToHex(r, g, b);
    }

    function hashString(input) {
      let hash = 0x811c9dc5;
      for (let index = 0; index < input.length; index += 1) {
        hash ^= input.charCodeAt(index);
        hash = Math.imul(hash, 0x01000193);
      }
      return hash >>> 0;
    }

    function scoreMood(input) {
      const dictionaries = [
        { hue: 350, terms: ["爱", "心动", "吻", "拥抱", "温柔", "love", "kiss"] },
        { hue: 210, terms: ["孤", "雨", "夜", "海", "冷", "雪", "lonely", "rain", "sea"] },
        { hue: 28,  terms: ["梦", "光", "希望", "暖", "黎明", "晨", "hope", "dream"] },
        { hue: 130, terms: ["森林", "草", "风", "树", "山", "自然", "wind", "forest"] },
        { hue: 0,   terms: ["战", "杀", "怒", "枪", "血", "war", "kill"] },
        { hue: 280, terms: ["神秘", "魔", "幻", "影", "暗", "magic", "shadow"] },
        { hue: 50,  terms: ["金", "辉煌", "荣耀", "胜利", "gold", "glory"] },
        { hue: 195, terms: ["未来", "宇宙", "星", "飞", "space", "future"] }
      ];

      const text = (input || "").toLowerCase();
      let bestHue = 210;
      let bestScore = -1;

      for (const entry of dictionaries) {
        let score = 0;
        for (const term of entry.terms) {
          if (text.includes(term)) score += 1;
        }
        if (score > bestScore) {
          bestScore = score;
          bestHue = entry.hue;
        }
      }
      return bestHue;
    }

    function pickHueAnchor(baseHue, hash) {
      const drift = ((hash & 0xff) / 255 - 0.5) * 28;
      const hue = (baseHue + drift + 360) % 360;
      return hue;
    }

    function hslToRgb(h, s, l) {
      if (s === 0) {
        const value = Math.round(l * 255);
        return [value, value, value];
      }
      const q = l < 0.5 ? l * (1 + s) : l + s - l * s;
      const p = 2 * l - q;
      const toChannel = (t) => {
        let temp = t;
        if (temp < 0) temp += 1;
        if (temp > 1) temp -= 1;
        if (temp < 1 / 6) return p + (q - p) * 6 * temp;
        if (temp < 1 / 2) return q;
        if (temp < 2 / 3) return p + (q - p) * (2 / 3 - temp) * 6;
        return p;
      };
      return [
        Math.round(toChannel(h + 1 / 3) * 255),
        Math.round(toChannel(h) * 255),
        Math.round(toChannel(h - 1 / 3) * 255)
      ];
    }

    function rgbToHex(r, g, b) {
      const toHex = (value) => clamp(value, 0, 255).toString(16).padStart(2, "0");
      return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
    }

    const autoButton = document.getElementById("autoButton");
    const actionStage = document.getElementById("actionStage");
    const intervalPicker = document.getElementById("intervalPicker");
    let autoTimer = null;
    let autoInterval = 6000;

    // ── 本地音乐播放器：随机播放列表 + 声音蒙太奇 ───────────────────────────
    const PLAYLIST = [
      "canon-in-d.mp3",
      "river-flows-in-you.mp3",
      "katawaredoki.mp3",
      "moonlight-sonata.mp3",
    ];
    const MUSIC_VOL = 0.38;
    const bgMusic = document.getElementById("bgMusic");
    let musicFader = null;
    let musicActive = false;
    let trackIndex = 0;

    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    function pickNextTrack() {
      if (PLAYLIST.length <= 1) return 0;
      let next;
      do { next = Math.floor(Math.random() * PLAYLIST.length); } while (next === trackIndex);
      return next;
    }

    bgMusic.addEventListener("ended", () => {
      trackIndex = pickNextTrack();
      bgMusic.src = PLAYLIST[trackIndex];
      bgMusic.volume = MUSIC_VOL;
      bgMusic.play().catch(() => {});
    });

    function clearMusicFader() {
      if (musicFader !== null) { clearInterval(musicFader); musicFader = null; }
    }

    function fadeMusic(toVol, ms, onDone) {
      clearMusicFader();
      const fromVol = bgMusic.volume;
      const diff = toVol - fromVol;
      if (Math.abs(diff) < 0.001) { if (onDone) onDone(); return; }
      const STEPS = 40;
      const tick = ms / STEPS;
      let step = 0;
      musicFader = setInterval(() => {
        step++;
        bgMusic.volume = Math.min(1, Math.max(0, fromVol + diff * step / STEPS));
        if (step >= STEPS) {
          clearMusicFader();
          bgMusic.volume = toVol;
          if (onDone) onDone();
        }
      }, tick);
    }

    function musicStart() {
      if (musicActive) return;
      musicActive = true;
      shuffleArray(PLAYLIST);
      trackIndex = 0;
      bgMusic.src = PLAYLIST[0];
      bgMusic.volume = 0;
      bgMusic.play().catch(() => {});
      fadeMusic(MUSIC_VOL, 2000);
    }

    function musicStop() {
      musicActive = false;
      fadeMusic(0, 1500, () => { bgMusic.pause(); bgMusic.currentTime = 0; });
    }

    // 换台词：2s淡出 → 文字切换 + 音频快进15~30s → 2s淡入
    function renderQuoteWithMontage() {
      if (!musicActive) { renderQuote(); return; }
      fadeMusic(0, 2000, () => {
        renderQuote();
        const skip = 15 + Math.random() * 15;
        if (bgMusic.duration && isFinite(bgMusic.duration)) {
          bgMusic.currentTime = Math.min(bgMusic.currentTime + skip, bgMusic.duration - 4);
        }
        fadeMusic(MUSIC_VOL, 2000);
      });
    }
    // ────────────────────────────────────────────────────────────────────────

    function startAutoplay() {
      stopAutoTimer();
      autoTimer = window.setInterval(() => renderQuoteWithMontage(), autoInterval);
      actionStage.dataset.mode = "playing";
      autoButton.classList.add("is-active");
      autoButton.setAttribute("aria-pressed", "true");
      musicStart();
    }

    function stopAutoplay() {
      stopAutoTimer();
      actionStage.dataset.mode = "idle";
      autoButton.classList.remove("is-active");
      autoButton.setAttribute("aria-pressed", "false");
      musicStop();
    }

    function stopAutoTimer() {
      if (autoTimer !== null) {
        window.clearInterval(autoTimer);
        autoTimer = null;
      }
    }

    autoButton.addEventListener("click", () => {
      if (actionStage.dataset.mode === "playing") {
        stopAutoplay();
      } else {
        startAutoplay();
      }
    });

    intervalPicker.dataset.active = String(autoInterval);
    intervalPicker.addEventListener("click", (event) => {
      const target = event.target.closest(".interval-option");
      if (!target) return;
      const next = Number(target.dataset.interval);
      if (!next || next === autoInterval) return;
      autoInterval = next;
      intervalPicker.dataset.active = String(autoInterval);
      intervalPicker.querySelectorAll(".interval-option").forEach((btn) => {
        btn.classList.toggle("is-selected", btn === target);
      });
      if (autoTimer !== null) startAutoplay();
    });

    document.addEventListener("dblclick", () => {
      if (actionStage.dataset.mode === "playing") stopAutoplay();
    });

    nextButton.addEventListener("click", () => renderQuote());
    searchForm.addEventListener("submit", (event) => {
      event.preventDefault();
      handleSearch(searchInput.value);
      if (actionStage.dataset.mode === "playing") stopAutoplay();
    });
    renderQuote(false);
  </script>
</body>
</html>
